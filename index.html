<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВоваМания</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        red: {
                            600: '#dc2626',
                            500: '#ef4444',
                        }
                    }
                }
            }
        }
    </script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 4px;
        }
        .animate-pulse-slow {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {};

        // Custom SVG Icons for reliability in single-file setup
        const Icons = {
            Menu: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            ),
            X: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            ),
            Send: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            ),
            Youtube: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17Z"/><path d="m10 15 5-3-5-3z"/></svg>
            ),
            Gamepad2: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/><path d="M9 18v2a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-2"/><path d="M15 18v2a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-2"/></svg>
            ),
            Copy: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            ),
            Check: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>
            ),
            Play: ({ className }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="6 3 20 12 6 21 6 3"/></svg>
            )
        };

        const AnimatedBlock = ({ children, className }) => {
            if (!motion) return <div className={`glass ${className}`}>{children}</div>;
            return (
                <motion.div
                    initial={{ opacity: 0, scale: 0.95, y: 20 }}
                    whileInView={{ opacity: 1, scale: 1, y: 0 }}
                    viewport={{ once: true }}
                    whileHover={{ scale: 1.02 }}
                    transition={{ duration: 0.5, ease: "easeOut" }}
                    className={`glass ${className}`}
                >
                    {children}
                </motion.div>
            );
        };

        const App = () => {
            const [copied, setCopied] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const serverIp = "vmka.aternos.me:19957";

            // Contact Form State
            const [name, setName] = useState('');
            const [message, setMessage] = useState('');
            const [isSending, setIsSending] = useState(false);
            const [isSent, setIsSent] = useState(false);

            useEffect(() => {
                if (window.emailjs) {
                    emailjs.init("VBh-ljt32c38-wL0f");
                }
            }, []);

            const handleSendFeedback = async (e) => {
                e.preventDefault();
                if (!message.trim()) {
                    alert("Напиши сообщение");
                    return;
                }

                setIsSending(true);
                try {
                    await emailjs.send("service_ebc9ztb", "template_xy9rt4m", {
                        name: name.trim() || "Аноним",
                        message: message
                    });
                    setIsSent(true);
                    setName('');
                    setMessage('');
                } catch (error) {
                    alert("Ошибка отправки");
                    console.error(error);
                } finally {
                    setIsSending(false);
                }
            };

            const copyToClipboard = () => {
                navigator.clipboard.writeText(serverIp);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const faqItems = [
                { q: "Как зайти на сервер?", a: "Скопируйте IP адрес (vmka.aternos.me:19957) и добавьте его в список серверов в Minecraft версии 1.21.1." },
                { q: "Нужна ли лицензия?", a: "Нет, на наш сервер можно зайти как с лицензии, так и с пиратской версии игры." },
                { q: "Что делать, если меня загриферили?", a: "Обратитесь к администрации в нашем Telegram канале. Мы постараемся помочь и наказать нарушителя." },
            ];

            const serverRules = [
                "Запрещено использование читов и стороннего ПО.",
                "Запрещен гриферство и воровство чужого имущества.",
                "Запрещен спам, капс и оскорбления в чате.",
                "Запрещена реклама сторонних ресурсов.",
                "Запрещено создание лаг-машин.",
            ];

            return (
                <div className="min-h-screen selection:bg-red-600 selection:text-white">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 bg-black/50 backdrop-blur-md border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => setIsMenuOpen(true)}
                                    className="p-2 hover:bg-white/10 rounded-lg transition-colors md:hidden"
                                >
                                    <Icons.Menu className="w-6 h-6" />
                                </button>
                                <div className="flex items-center gap-2">
                                    <div className="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center font-black text-white text-xl">
                                        ВМ
                                    </div>
                                    <span className="font-bold text-xl tracking-tighter uppercase hidden sm:block">ВоваМания</span>
                                </div>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-8 text-sm font-medium uppercase tracking-widest text-white/60">
                                <a href="#home" className="hover:text-red-500 transition-colors">Главная</a>
                                <a href="#minecraft" className="hover:text-red-500 transition-colors">Minecraft</a>
                                <a href="#youtube" className="hover:text-red-500 transition-colors">YouTube</a>
                                <a href="#contact" className="hover:text-red-500 transition-colors">Написать мне</a>
                                <a href="#rules" className="hover:text-red-500 transition-colors">Правила</a>
                            </div>

                            <a 
                                href="https://www.youtube.com/@Воваааанчик" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase tracking-tighter hover:bg-red-500 hover:text-white transition-all active:scale-95"
                            >
                                Подписаться
                            </a>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <React.Fragment>
                                <motion.div 
                                    initial={{ opacity: 0 }}
                                    animate={{ opacity: 1 }}
                                    exit={{ opacity: 0 }}
                                    onClick={() => setIsMenuOpen(false)}
                                    className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60]"
                                />
                                <motion.div 
                                    initial={{ x: '-100%' }}
                                    animate={{ x: 0 }}
                                    exit={{ x: '-100%' }}
                                    className="fixed top-0 left-0 bottom-0 w-[280px] bg-[#0a0a0a] border-r border-white/10 z-[70] p-8"
                                >
                                    <div className="flex items-center justify-between mb-12">
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-black text-white text-sm">ВМ</div>
                                            <span className="font-bold uppercase tracking-tighter">ВоваМания</span>
                                        </div>
                                        <button onClick={() => setIsMenuOpen(false)} className="p-2 hover:bg-white/10 rounded-lg">
                                            <Icons.X className="w-6 h-6" />
                                        </button>
                                    </div>
                                    <div className="flex flex-col gap-6 text-lg font-bold uppercase tracking-widest">
                                        <a href="#home" onClick={() => setIsMenuOpen(false)} className="hover:text-red-500 transition-colors">Главная</a>
                                        <a href="#minecraft" onClick={() => setIsMenuOpen(false)} className="hover:text-red-500 transition-colors">Minecraft</a>
                                        <a href="#youtube" onClick={() => setIsMenuOpen(false)} className="hover:text-red-500 transition-colors">YouTube</a>
                                        <a href="#contact" onClick={() => setIsMenuOpen(false)} className="hover:text-red-500 transition-colors">Написать мне</a>
                                        <a href="#rules" onClick={() => setIsMenuOpen(false)} className="hover:text-red-500 transition-colors">Правила</a>
                                        <a 
                                            href="https://t.me/maniya_vova12345mine" 
                                            target="_blank" 
                                            rel="noopener noreferrer" 
                                            className="text-blue-500 flex items-center gap-2"
                                        >
                                            Telegram <Icons.Send className="w-4 h-4" />
                                        </a>
                                    </div>
                                </motion.div>
                            </React.Fragment>
                        )}
                    </AnimatePresence>

                    {/* Hero Section */}
                    <section id="home" className="relative pt-32 pb-12 px-6 overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10">
                            <div className="absolute top-1/4 left-1/4 w-72 h-72 bg-red-600/20 blur-[100px] rounded-full animate-pulse-slow" />
                            <div className="absolute bottom-1/4 right-1/4 w-72 h-72 bg-blue-500/10 blur-[100px] rounded-full animate-pulse-slow" style={{ animationDelay: '2s' }} />
                        </div>

                        <div className="max-w-5xl mx-auto text-center">
                            <motion.div
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.6 }}
                            >
                                <span className="inline-block px-3 py-1 rounded-full border border-red-500/30 bg-red-500/10 text-red-500 text-[9px] font-bold uppercase tracking-[0.2em] mb-4">
                                    Добро пожаловать в манию
                                </span>
                                <h1 className="text-5xl md:text-7xl font-black tracking-tighter mb-6 leading-[0.9]">
                                    ВОВА<span className="text-red-600 italic">МАНИЯ</span>
                                </h1>
                                <p className="max-w-xl mx-auto text-base text-white/60 leading-relaxed mb-8">
                                    Твой любимый канал про игры, приключения и крутой контент. Присоединяйся к нашему сообществу и стань частью истории!
                                </p>
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-3">
                                    <a 
                                        href="#minecraft" 
                                        className="w-full sm:w-auto flex items-center justify-center gap-2 bg-red-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-red-500 transition-all text-sm"
                                    >
                                        IP Сервера
                                        <Icons.Gamepad2 className="w-4 h-4" />
                                    </a>
                                    <a 
                                        href="https://t.me/maniya_vova12345mine" 
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full sm:w-auto flex items-center justify-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all text-sm"
                                    >
                                        Telegram Канал
                                        <Icons.Send className="w-4 h-4" />
                                    </a>
                                </div>
                            </motion.div>
                        </div>
                    </section>

                    {/* Minecraft Server Section */}
                    <section id="minecraft" className="py-16 px-6 relative">
                        <div className="absolute inset-0 bg-red-600/5 -z-10" />
                        <AnimatedBlock className="max-w-2xl mx-auto text-center p-8 rounded-[2rem]">
                            <div className="flex flex-col items-center mb-8">
                                <div className="p-3 bg-red-600/20 rounded-xl mb-4 backdrop-blur-xl border border-white/10">
                                    <Icons.Gamepad2 className="w-6 h-6 text-red-500" />
                                </div>
                                <h2 className="text-3xl font-black tracking-tighter uppercase mb-4">Наш Minecraft Сервер</h2>
                                <p className="text-white/70 text-base leading-relaxed">
                                    Заходи на наш сервер VMKA! Мы создали уникальное пространство для выживания, творчества и общения.
                                </p>
                            </div>
                            
                            <div className="max-w-sm mx-auto">
                                <div className="p-5 bg-white/5 rounded-2xl flex items-center justify-between group">
                                    <div className="text-left">
                                        <p className="text-[9px] font-bold text-white/40 uppercase tracking-widest mb-1">Адрес сервера</p>
                                        <p className="text-xl font-mono font-bold text-red-500">{serverIp}</p>
                                    </div>
                                    <button 
                                        onClick={copyToClipboard}
                                        className="p-3 bg-white/5 hover:bg-white/10 rounded-xl transition-all active:scale-90 relative border border-white/5"
                                    >
                                        {copied ? <Icons.Check className="w-5 h-5 text-red-500" /> : <Icons.Copy className="w-5 h-5" />}
                                        {copied && (
                                            <span className="absolute -top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[9px] font-bold px-2 py-1 rounded shadow-xl">
                                                Скопировано!
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </AnimatedBlock>
                    </section>

                    {/* YouTube Section */}
                    <section id="youtube" className="py-20 px-6 relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-red-600/10 blur-[100px] rounded-full -z-10" />
                        <div className="max-w-5xl mx-auto text-center">
                            <AnimatedBlock className="p-10 md:p-16 rounded-[3rem] relative overflow-hidden group">
                                <div className="absolute inset-0 bg-gradient-to-br from-red-600/10 to-transparent opacity-30" />
                                <div className="relative z-10">
                                    <div className="flex items-center justify-center gap-4 mb-6">
                                        <motion.div 
                                            animate={{ scale: [1, 1.05, 1] }}
                                            transition={{ duration: 2, repeat: Infinity }}
                                            className="p-4 bg-red-600 rounded-2xl shadow-xl shadow-red-600/40"
                                        >
                                            <Icons.Youtube className="w-10 h-10 text-white" />
                                        </motion.div>
                                    </div>
                                    <h2 className="text-4xl md:text-5xl font-black tracking-tighter uppercase mb-6 leading-tight">
                                        Стань частью <br /> <span className="text-red-600">ВоваМании</span>
                                    </h2>
                                    <p className="text-white/60 text-lg max-w-xl mx-auto mb-8 font-medium">
                                        Следи за новыми выпусками! Я регулярно выкладываю прохождения и веселые видео.
                                    </p>
                                    
                                    <motion.a 
                                        href="https://www.youtube.com/@Воваааанчик" 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        whileHover={{ scale: 1.03 }}
                                        whileTap={{ scale: 0.97 }}
                                        className="inline-flex items-center gap-3 bg-red-600 text-white px-8 py-4 rounded-2xl font-black text-xl uppercase tracking-tighter shadow-xl shadow-red-600/50 hover:bg-red-500 transition-all group relative overflow-hidden"
                                    >
                                        <span className="relative z-10">Подписаться</span>
                                        <Icons.Play className="w-5 h-5 fill-current group-hover:translate-x-1 transition-transform relative z-10" />
                                    </motion.a>
                                </div>
                            </AnimatedBlock>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-16 px-6 relative">
                        <div className="max-w-lg mx-auto">
                            <AnimatedBlock className="p-8 md:p-10 rounded-[2.5rem] text-center">
                                {isSent ? (
                                    <motion.div 
                                        initial={{ scale: 0.8, opacity: 0 }}
                                        animate={{ scale: 1, opacity: 1 }}
                                        className="py-8"
                                    >
                                        <div className="text-5xl mb-4">✉️</div>
                                        <h2 className="text-2xl font-black uppercase tracking-tighter mb-3">Отправлено!</h2>
                                        <p className="text-white/60 text-sm">Я скоро прочитаю твое сообщение.</p>
                                        <button 
                                            onClick={() => setIsSent(false)}
                                            className="mt-6 text-red-500 font-bold uppercase tracking-widest text-[10px] hover:underline"
                                        >
                                            Написать еще раз
                                        </button>
                                    </motion.div>
                                ) : (
                                    <form onSubmit={handleSendFeedback} className="text-left">
                                        <h2 className="text-2xl font-black uppercase tracking-tighter mb-2 text-center">Написать мне</h2>
                                        <p className="text-white/40 text-center mb-8 text-sm">Есть предложение? Пиши!</p>
                                        
                                        <div className="space-y-3">
                                            <input 
                                                type="text" 
                                                placeholder="Твое имя"
                                                value={name}
                                                onChange={(e) => setName(e.target.value)}
                                                className="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 focus:outline-none focus:border-red-500 transition-colors text-white placeholder:text-white/20 text-sm"
                                            />
                                            <textarea 
                                                placeholder="Сообщение..."
                                                required
                                                value={message}
                                                onChange={(e) => setMessage(e.target.value)}
                                                className="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3 focus:outline-none focus:border-red-500 transition-colors text-white placeholder:text-white/20 h-28 resize-none text-sm"
                                            />
                                            
                                            <button 
                                                type="submit"
                                                disabled={isSending}
                                                className={`w-full mt-4 py-4 rounded-xl font-black uppercase tracking-tighter text-base transition-all shadow-xl ${
                                                    isSending 
                                                        ? 'bg-red-600/50 cursor-not-allowed' 
                                                        : 'bg-red-600 hover:bg-red-500 shadow-red-600/20 active:scale-[0.98]'
                                                }`}
                                            >
                                                {isSending ? 'Отправка...' : 'Отправить'}
                                            </button>
                                        </div>
                                    </form>
                                )}
                            </AnimatedBlock>
                        </div>
                    </section>

                    {/* FAQ Section */}
                    <section className="py-16 px-6">
                        <div className="max-w-2xl mx-auto">
                            <div className="text-center mb-10">
                                <h2 className="text-2xl font-bold tracking-tight uppercase">Вопросы</h2>
                            </div>
                            <div className="space-y-4">
                                {faqItems.map((item, idx) => (
                                    <AnimatedBlock key={idx} className="p-6 rounded-2xl">
                                        <h3 className="text-base font-bold mb-2 flex items-center gap-3">
                                            <span className="w-6 h-6 bg-red-600/20 text-red-500 rounded flex items-center justify-center text-[10px] font-black">Q</span> 
                                            {item.q}
                                        </h3>
                                        <p className="text-white/60 text-sm leading-relaxed pl-9">
                                            {item.a}
                                        </p>
                                    </AnimatedBlock>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Rules Section */}
                    <section id="rules" className="py-16 px-6 relative">
                        <div className="max-w-2xl mx-auto">
                            <div className="text-center mb-10">
                                <h2 className="text-2xl font-bold tracking-tight uppercase mb-2">Правила</h2>
                                <p className="text-white/60 text-sm">Соблюдение правил обязательно.</p>
                            </div>
                            <div className="space-y-3">
                                {serverRules.map((rule, idx) => (
                                    <AnimatedBlock key={idx} className="flex items-center gap-4 p-4 rounded-xl">
                                        <div className="w-8 h-8 bg-red-600/20 text-red-500 rounded-lg flex items-center justify-center font-black text-xs shrink-0 border border-red-500/20">
                                            {idx + 1}
                                        </div>
